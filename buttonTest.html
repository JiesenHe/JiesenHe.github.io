<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <style>
        /* 给按钮设置样式，使其为圆形且固定在右下角 */
        button {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: url('/icon/shawarma.svg') no-repeat center center;
            background-size: cover;
            border: none;
            position: fixed;
            bottom: 40px;
            right: 40px;
        }

        /* 初始隐藏这三个div块 */
        div[id^="color-div"] {
            display: none;
        }
    </style>
</head>

<body>

<div id="color-div1" style="background-color: red;height: 20px"></div>
<div id="color-div2" style="background-color: blue;height: 20px"></div>
<div id="color-div3" style="background-color: green;height: 20px"></div>
<div id="color-div4" style="background-color: red;height: 20px"></div>

<!-- 添加按钮 -->
<button id="showDivButton" style="">
</button>

<button id="DeleteDivButton" style="bottom: 120px;background: url('/icon/beer.svg') no-repeat center center;background-size: cover;">
</button>

<script>
    // 获取按钮元素
    const showDivButton = document.getElementById('showDivButton');
    const DeleteDivButton = document.getElementById('DeleteDivButton');

    // 获取要显示的三个div元素
    const div1 = document.getElementById('color-div1');
    const div2 = document.getElementById('color-div2');
    const div3 = document.getElementById('color-div3');
    const div4 = document.getElementById('color-div4');

    // 定义一个索引来跟踪当前要显示的div
    let currentDivIndex = 0;

    // 给按钮添加点击事件监听器
    showDivButton.addEventListener('click', function () {
        // 根据索引显示对应的div
        if (currentDivIndex<4){
            currentDivIndex++;
        }
        console.log(currentDivIndex);
        if (currentDivIndex === 1) {
            div1.style.display = 'block';
        } else if (currentDivIndex === 2) {
            div2.style.display = 'block';
        } else if (currentDivIndex === 3) {
            div3.style.display = 'block';
        } else if (currentDivIndex === 4) {
            div4.style.display = 'block';
        }
    });
    DeleteDivButton.addEventListener('click', function () {
        // 根据索引显示对应的div
        if (0<currentDivIndex){
            currentDivIndex--;
        }
        console.log(currentDivIndex);
        if (currentDivIndex === 0) {
            div1.style.display = 'none';
        } else if (currentDivIndex === 1) {
            div2.style.display = 'none';
        } else if (currentDivIndex === 2) {
            div3.style.display = 'none';
        } else if (currentDivIndex === 3) {
            div4.style.display = 'none';
        }
    });
</script>
</body>

</html>
